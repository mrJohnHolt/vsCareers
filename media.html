<!DOCTYPE html>
<html lang="en-GB" data-role="visitor">
<head>
  <meta charset="UTF-8">
  <script src="js/role-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vital Synergy ops dashboard — manage and publish job media to social platforms.">
  <title>Your Job Media | Vital Synergy Ops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="top-bar">
    <div class="top-bar__inner container">
      <a href="/employer-login" class="top-bar__link top-bar__link--hidden">
        <i class="fa-solid fa-building" aria-hidden="true"></i>
        Employer Login
      </a>
      <a href="/candidate-login" class="top-bar__link">
        <i class="fa-solid fa-user" aria-hidden="true"></i>
        Candidate Login
      </a>
    </div>
  </div>

  <nav class="nav" id="nav">
    <div class="nav__inner container">
      <a href="index.html" class="nav__logo">
        <img src="img/Vital synergy logo EE - Transparent.png" alt="Vital Synergy" class="logo-img">
      </a>
      <ul class="nav__links" id="nav-links">
        <li><a href="index.html"><i class="fa-solid fa-house nav__icon" aria-hidden="true"></i>Home</a></li>
        <li><a href="about.html"><i class="fa-solid fa-circle-info nav__icon" aria-hidden="true"></i>About</a></li>
        <li><a href="jobs.html"><i class="fa-solid fa-briefcase nav__icon" aria-hidden="true"></i>Jobs</a></li>
        <li><a href="about.html#contact-form"><i class="fa-solid fa-envelope nav__icon" aria-hidden="true"></i>Contact Us</a></li>
        <li class="role-employer nav__dropdown">
          <button class="nav__dropdown-toggle" aria-expanded="false" aria-haspopup="true">
            <i class="fa-solid fa-gauge nav__icon" aria-hidden="true"></i>Admin<i class="fa-solid fa-chevron-down nav__dropdown-arrow" aria-hidden="true"></i>
          </button>
          <ul class="nav__submenu">
            <li><a href="media.html" class="active">Media</a></li>
            <li><a href="applications.html">Applicants</a></li>
          </ul>
        </li>
      </ul>
      <a href="tel:+441282773338" class="nav__phone">
        <i class="fa-solid fa-phone" aria-hidden="true"></i>
        01282 773 338
      </a>
      <button class="nav__hamburger" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-links">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <main class="media-main">

    <!-- Access Gate -->
    <div class="ops-gate">
      <div class="ops-gate__inner">
        <div class="ops-gate__icon">
          <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
        </div>
        <h2>Ops Access Required</h2>
        <p>This dashboard is restricted to Vital Synergy operations staff only.</p>
        <p class="ops-gate__hint">Use the <strong>Switch Role</strong> button in the top bar to access.</p>
      </div>
    </div>

    <!-- Ops Dashboard -->
    <div class="ops-dashboard" id="ops-dashboard">

      <!-- Dashboard top bar -->
      <div class="dash-topbar">
        <div class="dash-topbar__left">
          <span class="dash-badge">Ops Only</span>
          <h1 class="dash-title">Your Job Media</h1>
        </div>
        <div class="dash-topbar__right">
          <button class="dash-action-btn" id="btn-refresh">
            <i class="fa-solid fa-rotate" aria-hidden="true"></i>
            Refresh
          </button>
          <button class="dash-action-btn dash-action-btn--primary" id="btn-publish-all">
            <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
            Publish All
          </button>
        </div>
      </div>

      <!-- Search filter -->
      <div class="campaigns-header">
        <input class="dash-search" type="search" placeholder="Search roles…" id="dash-search" aria-label="Search vacancies">
      </div>

      <!-- Per-vacancy campaign cards (rendered by media.js) -->
      <div class="campaigns-container" id="campaigns-container"></div>

    </div>

  </main>

  <script src="js/main.js" defer></script>
  <script src="js/media.js" defer></script>
</body>
</html>
